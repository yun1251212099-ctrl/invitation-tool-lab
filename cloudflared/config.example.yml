# 复制为 ~/.cloudflared/config.yml 或 cloudflared/config.local.yml 后按说明填写。
# 一次性准备（本机终端执行）：
#   cloudflared tunnel login
#   cloudflared tunnel create invitation-streamlit
#   cloudflared tunnel route dns invitation-streamlit invite.你的域名.com
# 将命令输出的 UUID 填入下方 tunnel，并把 credentials-file 指到生成的 json。

tunnel: <TUNNEL_UUID>
credentials-file: /Users/你的用户名/.cloudflared/<TUNNEL_UUID>.json

ingress:
  - hostname: invite.你的域名.com
    service: http://127.0.0.1:8599
  - service: http_status:404
